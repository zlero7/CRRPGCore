# =============================================
#         CRRPGCore Plugin Configuration
# =============================================

# ─── 데이터 저장소 설정 ───────────────────────
storage:
  # 저장 방식: yaml 또는 mysql
  type: yaml

  mysql:
    host:     localhost
    port:     3306
    database: minecraft
    username: root
    password: ""
    table-prefix: crrpg_
    pool-size: 5
    connection-timeout: 30000

# ─── 레벨 설정 ────────────────────────────────
level:
  max-level: 100
  base-xp: 100
  multiplier: 1.2

# ─── 레벨업 타이틀 설정 ───────────────────────
title:
  fade-in: 10
  stay: 60
  fade-out: 20
  level-up:
    title: "§a✦ 레벨업! ✦"
    subtitle: "§e현재 레벨 : {level}"
  max-level:
    title: "§6★ 최대 레벨 달성! ★"
    subtitle: "§eLv.{level} MAX"

# ─── 채팅 메시지 ──────────────────────────────
messages:
  show-xp-on-gain: true
  xp-gained: "§7[§b+{xp} XP§7] §8(§7{current}§8/§7{required}§8)"

# ─── 전투 메시지 설정 ──────────────────────────
combat:
  # 공격자에게 보내는 전투 아웃풋 메시지 활성화 여부
  show-out-message: true
  # 피격자에게 보내는 전투 인풋 메시지 활성화 여부
  show-in-message: true

# ─── 스텟 설정 ────────────────────────────────
stat:
  points-per-level: 3
  max-strength: 100
  max-vitality: 100
  max-agility:  100
  max-defense: 90.0

# ─── 소켓 / 감정 비용 설정 ────────────────────
economy:
  socket-cost: 10000
  appraisal-cost: 30000
  socket-reroll-cost: 10000
  appraisal-reroll-cost: 30000

# ─── 소켓 설정 ────────────────────────────────
socket:
  max-sockets:
    COMMON:    1
    UNCOMMON:  2
    RARE:      3
    EPIC:      4
    UNIQUE:    5
    LEGENDARY: 6

# ─── 강화 설정 ────────────────────────────────
upgrade:
  damage-bonus:
    0:  0
    1:  5
    2:  11
    3:  18
    4:  27
    5:  38
    6:  52
    7:  68
    8:  87
    9:  110
    10: 140

  chances:
    1:  { success: 70.0, keep: 30.0, down: 0.0,  break: 0.0  }
    2:  { success: 70.0, keep: 30.0, down: 0.0,  break: 0.0  }
    3:  { success: 70.0, keep: 30.0, down: 0.0,  break: 0.0  }
    4:  { success: 55.0, keep: 20.0, down: 15.0, break: 10.0 }
    5:  { success: 55.0, keep: 20.0, down: 15.0, break: 10.0 }
    6:  { success: 40.0, keep: 10.0, down: 30.0, break: 20.0 }
    7:  { success: 40.0, keep: 10.0, down: 30.0, break: 20.0 }
    8:  { success: 25.0, keep: 5.0,  down: 35.0, break: 35.0 }
    9:  { success: 15.0, keep: 5.0,  down: 30.0, break: 50.0 }
    10: { success: 8.0,  keep: 0.0,  down: 32.0, break: 60.0 }

# ─── 리롤 최대 횟수 기본값 ────────────────────
reroll:
  default-max-socket-reroll: -1
  default-max-appraisal-reroll: -1

# ─── 등급별 무기/방어구 스텟 범위 ──────────────
rpg-item:
  weapon:
    COMMON:
      damage:      { min: 5,    max: 10    }
      crit-chance: { min: 1.0,  max: 3.0   }
      crit-damage: { min: 110.0,max: 130.0 }
      atk-speed:   { min: 1.0,  max: 1.5   }
      penetration: { min: 0.0,  max: 2.0   }
      life-steal:  { min: 0.0,  max: 1.0   }
    UNCOMMON:
      damage:      { min: 10,   max: 20    }
      crit-chance: { min: 2.0,  max: 5.0   }
      crit-damage: { min: 120.0,max: 150.0 }
      atk-speed:   { min: 1.0,  max: 1.8   }
      penetration: { min: 1.0,  max: 5.0   }
      life-steal:  { min: 0.0,  max: 2.0   }
    RARE:
      damage:      { min: 20,   max: 40    }
      crit-chance: { min: 4.0,  max: 10.0  }
      crit-damage: { min: 130.0,max: 170.0 }
      atk-speed:   { min: 1.2,  max: 2.0   }
      penetration: { min: 3.0,  max: 10.0  }
      life-steal:  { min: 1.0,  max: 4.0   }
    EPIC:
      damage:      { min: 40,   max: 80    }
      crit-chance: { min: 8.0,  max: 18.0  }
      crit-damage: { min: 150.0,max: 200.0 }
      atk-speed:   { min: 1.5,  max: 2.5   }
      penetration: { min: 7.0,  max: 18.0  }
      life-steal:  { min: 2.0,  max: 7.0   }
    UNIQUE:
      damage:      { min: 70,   max: 130   }
      crit-chance: { min: 14.0, max: 25.0  }
      crit-damage: { min: 170.0,max: 230.0 }
      atk-speed:   { min: 1.8,  max: 3.0   }
      penetration: { min: 12.0, max: 25.0  }
      life-steal:  { min: 4.0,  max: 10.0  }
    LEGENDARY:
      damage:      { min: 120,  max: 200   }
      crit-chance: { min: 20.0, max: 35.0  }
      crit-damage: { min: 200.0,max: 280.0 }
      atk-speed:   { min: 2.2,  max: 3.5   }
      penetration: { min: 18.0, max: 35.0  }
      life-steal:  { min: 6.0,  max: 15.0  }
  armor:
    COMMON:
      health:  { min: 10,  max: 30   }
      defense: { min: 1.0, max: 5.0  }
      evasion: { min: 0.0, max: 2.0  }
    UNCOMMON:
      health:  { min: 30,  max: 70   }
      defense: { min: 4.0, max: 10.0 }
      evasion: { min: 1.0, max: 4.0  }
    RARE:
      health:  { min: 60,  max: 130  }
      defense: { min: 8.0, max: 18.0 }
      evasion: { min: 2.0, max: 7.0  }
    EPIC:
      health:  { min: 120, max: 220  }
      defense: { min: 15.0,max: 30.0 }
      evasion: { min: 4.0, max: 12.0 }
    UNIQUE:
      health:  { min: 200, max: 350  }
      defense: { min: 25.0,max: 45.0 }
      evasion: { min: 7.0, max: 18.0 }
    LEGENDARY:
      health:  { min: 320, max: 500  }
      defense: { min: 38.0,max: 65.0 }
      evasion: { min: 12.0,max: 25.0 }

